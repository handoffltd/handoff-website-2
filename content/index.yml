faq:
  title: Frequently Asked Questions
  items:
    - label: What exactly is Handoff?
      content: Handoff is an omnichannel smart inbox designed for businesses. It unifies your customer conversations from various messaging platforms into a single dashboard, allowing you to use AI agents to automate routine replies and seamlessly hand off complex issues to live human agents.
    - label: Which communication channels can I connect to Handoff?
      content: You can integrate the messaging platforms your customers already use, including WhatsApp, Facebook Messenger, Instagram DMs, Twilio SMS, and Telegram. All messages from these channels are routed into one centralized unified inbox.
    - label: Which AI models or agents does Handoff support?
      content: Handoff gives you the flexibility to connect the AI model you trust most. You can link it to popular LLMs via OpenAI prompts, integrate with tools like Microsoft Copilot Studio, or plug in Claude LLM or your own custom AI agents to handle auto-replies.
    - label: How does the "human handoff" feature work?
      content: Our smart logic monitors the conversation. Let the AI handle everyday FAQs and repetitive questions instantly. If a customer explicitly requests a human, or if the conversation requires a personal touch, the system effortlessly escalates the chat to a live human agent right within the same dashboard.
    - label: Is FREE plan available?
      content: Yes, Handoff is completely free to use while we are in our BETA phase. Once we transition out of beta, we are committed to offering highly competitive and accessible pricing.
    - label: Can I use Handoff on my phone?
      content: Yes! Handoff is built to keep you connected anywhere. You can access your inbox via any modern web browser, our native desktop applications for Windows, Mac, and Linux, or our mobile apps for iOS and Android.
    - label: Do I need technical skills to set it up?
      content: Getting started is effortless. In just a few minutes, you can connect your channels, link your preferred AI agent, and start managing your customer conversations seamlessly.
    - label: Can I embed Handoff inside my own software?
      content: Yes! Handoff offers first-class white-labeling and embedding support. You can completely remove our branding, customize the colors to match your UI, and embed the full smart inbox experience natively inside your own SaaS application or internal tools.

